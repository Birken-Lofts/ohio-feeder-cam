services:
  camera-restream:
    build: .
    container_name: camera-restream
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/Chicago}
    volumes:
      - ./overlay_render.py:/app/overlay_render.py:ro
      - ./assets:/app/assets:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[$$(date '+%F %T')] starting render -> encode -> restream";
          python3 /app/overlay_render.py | ffmpeg -hide_banner -loglevel warning \
            -rtsp_transport tcp -fflags +genpts -thread_queue_size 512 \
            -i "rtsp://$$CAM_USER:$$CAM_PASS@$$CAM_IP$$CAM_PATH" \
            -f image2pipe -thread_queue_size 512 -framerate $$OVERLAY_FPS -i - \
            -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -filter_complex "[0:v]scale=1920:1080:force_original_aspect_ratio=disable,setsar=1[base];[base][1:v]overlay=0:0:eof_action=repeat:shortest=0[v]" \
            -map "[v]" -map 2:a \
            -c:v libx264 -preset $$X264_PRESET -profile:v high -pix_fmt yuv420p \
            -b:v $$VBITRATE -maxrate $$VBITRATE -bufsize $$VBUFSIZE \
            -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
            -force_key_frames "expr:gte(t,n_forced*2)" \
            -c:a aac -b:a 128k -ar 44100 \
            -t 82800 \
            -f flv "$$RESTREAM_URL/$$RESTREAM_KEY";
          echo "[$$(date '+%F %T')] pipeline exited ($$?). Restart in 10s.";
          sleep 10;
        done
    healthcheck:
      test: ["CMD-SHELL", "ffprobe -v error -rtsp_transport tcp -i \"rtsp://$$CAM_USER:$$CAM_PASS@$$CAM_IP$$CAM_PATH\" -show_entries stream=codec_type -of csv=p=0 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
