services:
  camera-restream:
    build: .
    container_name: camera-restream
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/Chicago}
    volumes:
      - ./overlay_render.py:/app/overlay_render.py:ro
      - ./assets:/app/assets:ro
      - ./data:/app/data:ro          # reads counts.json written by vehicle-counter
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[$$(date '+%F %T')] starting render -> encode -> restream";
          python3 /app/overlay_render.py | ffmpeg -hide_banner -loglevel warning \
            -rtsp_transport tcp -fflags +genpts -thread_queue_size 512 \
            -i "rtsp://$$CAM_USER:$$CAM_PASS@$$CAM_IP$$CAM_PATH" \
            -f image2pipe -thread_queue_size 512 -framerate $$OVERLAY_FPS -i - \
            -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
            -filter_complex "[0:v]scale=1920:1080:force_original_aspect_ratio=disable,setsar=1[base];[base][1:v]overlay=0:0:eof_action=repeat:shortest=0[v]" \
            -map "[v]" -map 2:a \
            -c:v libx264 -preset $$X264_PRESET -profile:v high -pix_fmt yuv420p \
            -b:v $$VBITRATE -maxrate $$VBITRATE -bufsize $$VBUFSIZE \
            -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
            -force_key_frames "expr:gte(t,n_forced*2)" \
            -c:a aac -b:a 128k -ar 44100 \
            -t 82800 \
            -f flv "$$RESTREAM_URL/$$RESTREAM_KEY";
          echo "[$$(date '+%F %T')] pipeline exited ($$?). Restart in 10s.";
          sleep 10;
        done
    healthcheck:
      test: ["CMD-SHELL", "ffprobe -v error -rtsp_transport tcp -i \"rtsp://$$CAM_USER:$$CAM_PASS@$$CAM_IP$$CAM_PATH\" -show_entries stream=codec_type -of csv=p=0 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Vehicle counter (YOLO). PROD/NVIDIA only -- gated behind the "gpu" profile so
  # a plain `docker compose up` (e.g. on the Mac) does NOT start it. Bring it up on
  # the GPU box with:  docker compose --profile gpu up -d --build vehicle-counter
  # On the dev Mac, run vehicle_counter.py natively instead (uses MPS).
  vehicle-counter:
    build:
      context: .
      dockerfile: Dockerfile.counter
    container_name: vehicle-counter
    restart: unless-stopped
    profiles: ["gpu"]
    env_file: .env
    environment:
      - TZ=${TZ:-America/Chicago}
      # Override the .env DATABASE_URL (which targets localhost for native dev)
      # to reach the postgres service by name from inside the compose network.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-feedercam}:${POSTGRES_PASSWORD:-feedercam}@postgres:5432/${POSTGRES_DB:-feedercam}
      - WEIGHTS_DIR=/app/weights     # YOLO weights persist in the `weights` volume
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./vehicle_counter.py:/app/vehicle_counter.py:ro
      - ./data:/app/data             # writes counts.json (shared w/ streamer)
      - weights:/app/weights         # cached model weights (no re-download on recreate)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Postgres durable store for per-vehicle crossing history. No profile, so it
  # starts with the default stack in prod; on the dev Mac start just this one:
  #   docker compose up -d postgres
  # and run vehicle_counter.py natively (it connects via DATABASE_URL on localhost).
  postgres:
    image: postgres:16
    container_name: feedercam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedercam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feedercam}
      POSTGRES_DB: ${POSTGRES_DB:-feedercam}
    ports:
      - "5432:5432"                  # exposed so the native dev counter can connect
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedercam} -d ${POSTGRES_DB:-feedercam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  weights:
